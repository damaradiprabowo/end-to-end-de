# dbt profile for ClickHouse. Connection values come from environment variables
# so the same profile works locally and inside Docker/Airflow.
minimarket:
  target: dev
  outputs:
    dev:
      type: clickhouse
      schema: "{{ env_var('CLICKHOUSE_ANALYTICS_DB', 'analytics') }}"
      host: "{{ env_var('CLICKHOUSE_HOST', 'localhost') }}"
      port: "{{ env_var('CLICKHOUSE_HTTP_PORT', '8123') | int }}"
      user: "{{ env_var('CLICKHOUSE_USER', 'default') }}"
      password: "{{ env_var('CLICKHOUSE_PASSWORD', 'clickhouse') }}"
      driver: http
      secure: false
      connect_timeout: 10
      send_receive_timeout: 300
      threads: 4
