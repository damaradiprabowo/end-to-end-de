version: 2

sources:
  - name: raw
    description: "Landing tables loaded from PostgreSQL by the Python/Go EL loaders."
    # In dbt-clickhouse, `schema` maps to the ClickHouse database name.
    schema: "{{ env_var('CLICKHOUSE_RAW_DB', 'raw') }}"
    # Raw-layer data quality: critical-column null checks run directly on the
    # landed source tables (the row-count-vs-source reconciliation is performed
    # by the dq_raw task in the Airflow DAG, which can reach Postgres).
    tables:
      - name: customers
        columns:
          - name: customer_id
            tests: [not_null]
      - name: products
        columns:
          - name: product_id
            tests: [not_null]
          - name: unit_price
            tests: [not_null]
      - name: stores
        columns:
          - name: store_id
            tests: [not_null]
      - name: suppliers
        columns:
          - name: supplier_id
            tests: [not_null]
      - name: promotions
        columns:
          - name: promo_id
            tests: [not_null]
      - name: transactions
        columns:
          - name: transaction_id
            tests: [not_null]
          - name: transaction_date
            tests: [not_null]
          - name: total_amount
            tests: [not_null]
      - name: transaction_items
        columns:
          - name: item_id
            tests: [not_null]
          - name: quantity
            tests: [not_null]
      - name: transaction_promotions
        columns:
          - name: id
            tests: [not_null]
      - name: employees
        columns:
          - name: employee_id
            tests: [not_null]
      - name: inventory
        columns:
          - name: inventory_id
            tests: [not_null]
          - name: stock_qty
            tests: [not_null]
      - name: product_supplier
        columns:
          - name: id
            tests: [not_null]
      - name: customer_loyalty
        columns:
          - name: loyalty_id
            tests: [not_null]
